<!DOCTYPE html> <!-- tipo de contenido html:5 -->
<html lang="es"> <!-- definicion de html, por ejemplo lenguaje -->
<head> <!-- titulos, contenidos  -->
    <meta charset="UTF-8"> <!-- etiqueta que define el diccionario de carácteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- esta etiqueta ayuda a ajustar los objetos según la dimensión de la pantalla  -->
    <title>Document</title> <!-- titulo de la pagina, se presenta en la pestaña del navegador web -->
</head>
<body> <!-- contenido de la página  -->
    <h1 style="color: aqua;"></h1> <!-- tipo de color -->
   <!--una etiqueta para insertar una imagen-->
   <!-- especifica la url de un archivo-->
    <!-- define un texto descriptivo si la imagen no carga -->
    <img  src="" alt="" srcset=""> <!-- Define multiples imagenes para diferentes resoluciones, tamaños de pantalla.-->
    <p></p>
    <!-- marco en linea-->
     <!--donde se coloca la url -->
     <!--marco que no tendra borde -->
    <iframe src=""  frameborder="0"></iframe>
</body>
</html>
